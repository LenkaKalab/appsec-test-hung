name: Security Scan

on:
  push:
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install tools
        run: |
          pip install bandit pip-audit

      - name: Run Bandit (SAST)
        continue-on-error: true
        run: bandit -r .

      - name: Run pip-audit (dependencies)
        run: pip-audit
